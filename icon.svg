<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#accentGrad)" stroke-width="8" opacity="0.3" />
  
  <!-- Content: Calculator meets Stock chart -->
  <g transform="translate(64, 64)">
    <!-- Stock Chart Candles -->
    <rect x="64" y="180" width="24" height="120" rx="4" fill="#ef4444" opacity="0.4" />
    <line x1="76" y1="140" x2="76" y2="340" stroke="#ef4444" stroke-width="4" opacity="0.4" />

    <rect x="128" y="120" width="24" height="140" rx="4" fill="#22c55e" opacity="0.5" />
    <line x1="140" y1="80" x2="140" y2="300" stroke="#22c55e" stroke-width="4" opacity="0.5" />

    <rect x="192" y="160" width="24" height="80" rx="4" fill="#22c55e" />
    <line x1="204" y1="120" x2="204" y2="280" stroke="#22c55e" stroke-width="4" />

    <!-- Calculator Overlay Grid / Target Lines -->
    <!-- Stop Loss Line (Red) -->
    <line x1="40" y1="240" x2="340" y2="240" stroke="url(#redGrad)" stroke-width="6" stroke-dasharray="10, 10" />
    <circle cx="340" cy="240" r="10" fill="#ef4444" />
    <text x="340" y="225" fill="#f87171" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="end">STOP</text>

    <!-- Entry Line (Blue) -->
    <line x1="40" y1="160" x2="340" y2="160" stroke="url(#accentGrad)" stroke-width="8" />
    <circle cx="340" cy="160" r="12" fill="#38bdf8" />
    <text x="340" y="145" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="end">ENTRY</text>

    <!-- Target Line (Green) -->
    <line x1="40" y1="80" x2="340" y2="80" stroke="url(#greenGrad)" stroke-width="6" stroke-dasharray="10, 10" />
    <circle cx="340" cy="80" r="10" fill="#22c55e" />
    <text x="340" y="65" fill="#4ade80" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="end">TARGET</text>
    
    <!-- Mathematical symbols overlay (subtle) -->
    <text x="64" y="340" fill="#64748b" font-family="Courier, monospace" font-size="72" font-weight="bold">%</text>
    <text x="240" y="340" fill="#64748b" font-family="Courier, monospace" font-size="72" font-weight="bold">=</text>
  </g>
</svg>
